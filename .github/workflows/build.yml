name: Build Bitcoin Dashboard APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manuell auslösbar über GitHub UI

jobs:
  build:
    name: Build APK (Snapdragon 8 / arm64)
    runs-on: ubuntu-latest

    steps:

      # 1. Code auschecken
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 2. Java 17 einrichten (Required für AGP 8.x)
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Android SDK einrichten
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Gradle Wrapper ausführbar machen
      - name: 🔧 Make Gradle Wrapper executable
        run: chmod +x ./gradlew

      # 5. Gradle Cache (schnellere Builds)
      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 6. Debug APK bauen
      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4g"

      # 7. APK umbenennen (mit Datum)
      - name: 📝 Rename APK
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/BitcoinDashboard-${DATE}-debug.apk
          echo "APK_NAME=BitcoinDashboard-${DATE}-debug.apk" >> $GITHUB_ENV

      # 8. APK als Artifact hochladen → direkt downloadbar
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BitcoinDashboard-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # 9. Build-Info ausgeben
      - name: ✅ Build Summary
        run: |
          echo "### ✅ Build erfolgreich!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** \`${{ env.APK_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Optimiert für:** Snapdragon 8 (arm64-v8a)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 APK unter **Actions → Artifacts** herunterladen" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -sh app/build/outputs/apk/debug/*.apk | cut -f1)
          echo "**APK Größe:** ${APK_SIZE}" >> $GITHUB_STEP_SUMMARY
