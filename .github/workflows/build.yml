name: Build Bitcoin Dashboard APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Snapdragon 8 / arm64)
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔧 Setup Gradle Wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: 🔨 Build Debug APK
        run: gradle assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

      - name: 📝 Rename APK
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          mkdir -p app/build/outputs/apk/debug/
          find app/build/outputs/apk/debug/ -name "*.apk" -exec mv {} app/build/outputs/apk/debug/BitcoinDashboard-${DATE}-debug.apk \;
          echo "APK_NAME=BitcoinDashboard-${DATE}-debug.apk" >> $GITHUB_ENV

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BitcoinDashboard-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: ✅ Build Summary
        run: |
          echo "### ✅ Build erfolgreich!" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** \`${{ env.APK_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Optimiert für:** Snapdragon 8 (arm64-v8a)" >> $GITHUB_STEP_SUMMARY
